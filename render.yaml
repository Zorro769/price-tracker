services:
  - type: worker                  # background worker — no HTTP port needed
    name: amazon-price-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python monitor.py

    # Persistent disk so prices.json and books.txt survive restarts
    disk:
      name: monitor-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: TELEGRAM_TOKEN
        sync: false               # fill in the Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false               # fill in the Render dashboard
      - key: SCRAPER_API_KEY
        sync: false               # optional but recommended
      - key: URLS_FILE
        value: /data/books.txt
      - key: PRICES_FILE
        value: /data/prices.json
      - key: CHECK_INTERVAL_SECONDS
        value: "3600"             # check every hour
      - key: PRICE_DROP_THRESHOLD_PCT
        value: "1"                # notify on ≥ 1 % drop